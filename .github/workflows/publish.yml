name: Publish to PyPI

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: release          # optional GHA approval gate
    permissions:
      id-token: write             # required for OIDC trusted publishing

    # TODO: before this workflow runs for the first time, register a trusted
    # publisher on PyPI:
    #   pypi.org → project → Manage → Publishing → Add publisher
    #   owner: mpesavento  repo: swarmbus
    #   workflow: publish.yml  environment: release
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No API token needed — uses OIDC trusted publishing.
        # See: https://docs.pypi.org/trusted-publishers/
